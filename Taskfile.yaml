version: "3"

tasks:

  vite-dev:
    desc: Uruchamia serwer deweloperski Vite (HMR, src/app)
    cmds:
      - deno run -A src/app/server-dev.ts
    interactive: true

  vite-build:
    desc: Buduje wersję Vite do produkcji (dist/app/client + dist/app/server)
    cmds:
      - deno run -A npm:vite build --config src/app/vite.config.ts --app

  vite-start:
    desc: Uruchamia zbudowany serwer z dist/app/ (wymaga vite-build)
    env:
      NODE_ENV: production
    cmds:
      - deno run -A dist/app/server/index.mjs
    interactive: true

  typecheck:
    desc: Sprawdza typy TypeScript w całym projekcie
    cmds:
      - deno check app.config.ts app-desktop.config.ts createApp.ts src/app/ src_desktop/

  install:
    desc: Instaluje zależności npm przez Deno
    cmds:
      - deno install
