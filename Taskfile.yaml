version: "3"

tasks:

  vite-dev:
    desc: Uruchamia serwer deweloperski Vite (HMR, src/app)
    cmds:
      - deno run -A src/app/server-dev.ts
    interactive: true

  vite-build:
    desc: Buduje wersję Vite do produkcji (dist/app/client + dist/app/server)
    cmds:
      - deno run -A npm:vite build --config src/app/vite.config.ts --app

  vite-start:
    desc: Uruchamia zbudowany serwer z dist/app/ (wymaga vite-build)
    env:
      NODE_ENV: production
    cmds:
      - deno run -A dist/app/server/index.mjs
    interactive: true

  desktop-dev:
    desc: Uruchamia aplikację desktop w trybie dev (okno + HMR)
    cmds:
      - deno desktop --hmr -A src/app/server-dev.ts
    interactive: true

  desktop-build:
    desc: Buduje aplikację desktop (.app na macOS, wymaga vite-build)
    deps:
      - vite-build
    cmds:
      - deno desktop -A --no-check --include dist/app dist/app/server/index.mjs

  desktop-run:
    desc: Uruchamia zbudowaną aplikację desktop (wymaga desktop-build)
    cmds:
      - open dist/vinxi-desktop.app
    interactive: true

  typecheck:
    desc: Sprawdza typy TypeScript w całym projekcie
    cmds:
      - deno check src/app/

  install:
    desc: Instaluje zależności npm przez Deno
    cmds:
      - deno install
